<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary Colors — Maroon & Amber" subtitle="Phoenix Maroon scale + Tile Roof Amber accent" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1e1b18; padding: 16px; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
  .row { display: flex; gap: 6px; margin-bottom: 10px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; flex: 1; }
  .chip { height: 52px; border-radius: 6px; }
  .chip.tall { height: 80px; }
  .name { font-size: 10px; color: #8C8580; margin-top: 4px; font-weight: 500; }
  .hex  { font-size: 10px; color: #5C5248; font-family: 'JetBrains Mono', monospace; }
  .section-label { font-size: 10px; color: #756B62; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="section-label">Phoenix Maroon</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#4A0000"></div><div class="name">900</div><div class="hex">#4A0000</div></div>
  <div class="swatch"><div class="chip" style="background:#680000"></div><div class="name">800</div><div class="hex">#680000</div></div>
  <div class="swatch"><div class="chip tall" style="background:#800000;outline:2px solid #C4903A;outline-offset:2px"></div><div class="name">700 ★</div><div class="hex">#800000</div></div>
  <div class="swatch"><div class="chip" style="background:#960000"></div><div class="name">600</div><div class="hex">#960000</div></div>
  <div class="swatch"><div class="chip" style="background:#A80000"></div><div class="name">500</div><div class="hex">#A80000</div></div>
  <div class="swatch"><div class="chip" style="background:#C43030"></div><div class="name">400</div><div class="hex">#C43030</div></div>
  <div class="swatch"><div class="chip" style="background:#D96060"></div><div class="name">300</div><div class="hex">#D96060</div></div>
</div>
<div class="section-label" style="margin-top:4px">Accent Amber — Tile Roof Gold</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#9A6F28"></div><div class="name">700</div><div class="hex">#9A6F28</div></div>
  <div class="swatch"><div class="chip" style="background:#B07F30"></div><div class="name">600</div><div class="hex">#B07F30</div></div>
  <div class="swatch"><div class="chip tall" style="background:#C4903A;outline:2px solid #C4903A;outline-offset:2px"></div><div class="name">500 ★</div><div class="hex">#C4903A</div></div>
  <div class="swatch"><div class="chip" style="background:#D4A44E"></div><div class="name">400</div><div class="hex">#D4A44E</div></div>
  <div class="swatch"><div class="chip" style="background:#E4BC78"></div><div class="name">300</div><div class="hex">#E4BC78</div></div>
  <div class="swatch"><div class="chip" style="background:#F0D4A8"></div><div class="name">200</div><div class="hex">#F0D4A8</div></div>
</div>
</body>
</html>
