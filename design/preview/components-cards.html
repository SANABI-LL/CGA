<!DOCTYPE html>
<!-- @dsCard group="Components" name="Result Cards" subtitle="Location result cards with stripe accent and status badge" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { background: #1A1714; padding: 14px; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; gap: 10px; flex-wrap: wrap; }
  .card { background: #2E2A27; border: 1px solid #3D3530; border-radius: 8px; overflow: hidden; width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .card-stripe { width: 4px; background: #800000; flex-shrink: 0; }
  .card-inner { display: flex; }
  .card-body { padding: 10px 12px; flex: 1; }
  .card-name { font-size: 13px; font-weight: 600; color: #F0EDE8; margin-bottom: 2px; }
  .card-sub { font-size: 11px; color: #8C8580; margin-bottom: 6px; }
  .card-meta { font-size: 10px; color: #5C5248; font-family: 'JetBrains Mono', monospace; }
  .card-tag { display: inline-block; background: rgba(128,0,0,0.15); color: #D96060; border: 1px solid rgba(128,0,0,0.25); border-radius: 20px; font-size: 10px; padding: 1px 8px; margin-top: 6px; }
  .card-tag.green { background: rgba(46,125,94,0.15); color: #4DB88A; border-color: rgba(46,125,94,0.3); }
  .card-tag.amber { background: rgba(196,144,58,0.15); color: #E4BC78; border-color: rgba(196,144,58,0.3); }
  .card-icon { width: 28px; height: 28px; border-radius: 6px; background: rgba(128,0,0,0.15); display: flex; align-items: center; justify-content: center; margin-bottom: 6px; color: #D96060; }
</style>
</head>
<body>
<div class="card">
  <div class="card-inner">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </div>
      <div class="card-name">Regenstein Library</div>
      <div class="card-sub">1100 E 57th St · 0.1 mi</div>
      <div class="card-meta">Open · Until 2:00 AM</div>
      <div class="card-tag green">Open now</div>
    </div>
  </div>
</div>
<div class="card">
  <div class="card-inner">
    <div class="card-stripe" style="background:#C4903A"></div>
    <div class="card-body">
      <div class="card-icon" style="background:rgba(196,144,58,0.15);color:#E4BC78">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      </div>
      <div class="card-name">Hutchinson Commons</div>
      <div class="card-sub">Ratskeller · 5706 S University</div>
      <div class="card-meta">Closes · 8:00 PM</div>
      <div class="card-tag amber">Closing soon</div>
    </div>
  </div>
</div>
<div class="card" style="border-color:rgba(128,0,0,0.3)">
  <div class="card-inner">
    <div class="card-stripe" style="background:#3A7BC8"></div>
    <div class="card-body">
      <div class="card-icon" style="background:rgba(37,99,168,0.15);color:#60A0E0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div class="card-name">Harper Memorial</div>
      <div class="card-sub">1116 E 59th St · 0.2 mi</div>
      <div class="card-meta">Study room available</div>
      <div class="card-tag" style="background:rgba(37,99,168,0.15);color:#60A0E0;border-color:rgba(37,99,168,0.3)">Book room</div>
    </div>
  </div>
</div>
</body>
</html>
