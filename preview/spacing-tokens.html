<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing Tokens</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { background: #1A1714; padding: 16px; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar { background: #800000; height: 12px; border-radius: 3px; }
  .label { font-size: 10px; color: #8C8580; font-family: 'JetBrains Mono', monospace; width: 70px; flex-shrink: 0; }
  .val { font-size: 10px; color: #5C5248; }
  .section { font-size: 9px; color: #5C5248; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="section">Spacing Scale — 4px base unit</div>
<div class="row"><div class="label">--space-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
<div class="row"><div class="label">--space-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
<div class="row"><div class="label">--space-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
<div class="row"><div class="label">--space-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
<div class="row"><div class="label">--space-5</div><div class="bar" style="width:20px"></div><div class="val">20px</div></div>
<div class="row"><div class="label">--space-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
<div class="row"><div class="label">--space-8</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
<div class="row"><div class="label">--space-10</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
<div class="row"><div class="label">--space-12</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
<div class="row"><div class="label">--space-16</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
</body>
</html>
