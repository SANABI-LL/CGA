<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display Type</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1A1714; padding: 16px 20px; margin: 0; }
  .specimen { margin-bottom: 10px; border-bottom: 1px solid #2E2A27; padding-bottom: 10px; }
  .meta { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 9px; color: #5C5248; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .display { font-family: 'EB Garamond', Georgia, serif; color: #F0EDE8; }
  .italic { font-style: italic; }
</style>
</head>
<body>
<div class="specimen">
  <div class="meta">Display — EB Garamond 60px Regular</div>
  <div class="display" style="font-size:52px;line-height:1.1;letter-spacing:-0.02em">Campus Intelligence</div>
</div>
<div class="specimen">
  <div class="meta">H1 — EB Garamond 48px Regular Italic</div>
  <div class="display italic" style="font-size:40px;line-height:1.15">Where is the Reg open until tonight?</div>
</div>
<div class="specimen">
  <div class="meta">H2 — Plus Jakarta Sans 30px Semibold</div>
  <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:600;color:#F0EDE8;line-height:1.3">Results for: Dining near Quad</div>
</div>
<div class="specimen" style="border:none;padding-bottom:0;margin-bottom:0">
  <div class="meta">H3 — Plus Jakarta Sans 20px Semibold</div>
  <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:600;color:#F0EDE8;line-height:1.3">Ratskeller — Hutchinson Commons</div>
</div>
</body>
</html>
