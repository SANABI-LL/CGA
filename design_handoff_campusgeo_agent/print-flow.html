/* ── Building name lookup (full name, word overlap, or acronym e.g. "CTS") */
function nameAcronym(name) {
  const stop = new Set(['of', 'for', 'the', 'and', 'at', 'in', 'on']);
  const words = name.toLowerCase().replace(/[^a-z0-9 ]/g, ' ').split(/\s+/).filter((w) => w && !stop.has(w));
  if (words.length < 2) return null;
  return words.map((w) => w[0]).join('');
}
const GENERIC_WORDS = new Set(['hall', 'house', 'building', 'center', 'centre', 'laboratory', 'memorial', 'south', 'north', 'east', 'west', 'street', 'avenue', 'campus']);
function findBuilding(q, feats) {
  const s = q.toLowerCase();
  const tokens = new Set(s.replace(/[^a-z0-9 ]/g, ' ').split(/\s+/).filter(Boolean));
  let best = null,bestScore = 0;
  for (const f of feats) {
    const p = f.properties;
    let score = 0;
    const names = [p.DISCRIPT1, p.OtherNames, p.Facility_Name].
    map((n) => (n || '').trim().toLowerCase()).filter((n) => n.length > 2);
    for (const n of names) {
      if (s.includes(n)) {score = Math.max(score, 100 + n.length);continue;}
      const acr = nameAcronym(n);
      if (acr && acr.length >= 3 && tokens.has(acr)) score = Math.max(score, 90);
      const words = n.replace(/[^a-z0-9 ]/g, ' ').split(/\s+/).filter((w) => w.length > 3 && !GENERIC_WORDS.has(w));
      if (words.length) {
        const hits = words.filter((w) => tokens.has(w)).length;
        if (hits === words.length) score = Math.max(score, 80 + hits);else
        if (hits >= 2) score = Math.max(score, 60 + hits);

    if (bd && bd.length >= 2 && tokens.has(bd)) score = Math.max(score, 95);
    if (score > bestScore) {bestScore = score;best = f;}
  }
  return bestScore >= 60 ? best : null;
}

/* Compute a nice round scale bar from meters-per-pixel */
function niceScale(mpp) {
  const ftpp = mpp * 3.28084;
  const TARGET_PX = 104; // desired bar width in px
  const rawFt = ftpp * TARGET_PX;
  // pick the nearest "nice" value
  const nices = [50, 100, 200, 500, 1000, 2000, 2500, 5000, 10000, 20000, 26400, 52800];
  let best = nices[0];
  for (const n of nices) {if (n <= rawFt * 1.3) best = n;else break;}
  const barPx = Math.round(best / ftpp);
  let label;
  if (best >= 5280) label = (best / 5280).toFixed(best % 5280 === 0 ? 0 : 1) + ' mi';else
  label = best.toLocaleString() + ' ft';
  return { barPx, label, segments: 4 };
}
const ScaleBar = ({ mpp }) => {
  const { barPx, label, segments } = niceScale(mpp || 0.5);
  const segW = Math.round(barPx / segments);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
      <div style={{ display: 'flex', height: 6, border: `1px solid ${T.ink}` }}>
        {Array.from({ length: segments }, (_, i) =>
        <div key={i} style={{ width: segW, background: i % 2 === 0 ? T.ink : T.white }} />
        )}
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 8, color: T.inkMd, fontFamily: 'JetBrains Mono,monospace', width: segW * segments }}>
        <span>0</span><span>{label}</span>
      </div>
    </div>);

};

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const suggestions = useMemo(() => {
    let list = SUGGESTIONS_EN.slice(0, t.exampleCount);
    // when Chinese is on, give it a visible slot within the limit (swap the last chip)
    if (t.showChinese) list = [...list.slice(0, Math.max(0, t.exampleCount - 1)), SUGGESTIONS_ZH];
    return list;
  }, [t.showChinese, t.exampleCount]);
  const [phase, setPhase] = useState('idle'); // idle · thinking · composing · editing · provenance · unrecognized
  const [editState, setEditState] = useState(null); // null · 'review' · 'applied'
  const [unrecMsg, setUnrecMsg] = useState(null);
  const [query, setQuery] = useState('');
  const [submitted, setSubmitted] = useState('');
  const [shown, setShown] = useState(0); // reasoning steps revealed
  const [traceDone, setTraceDone] = useState(false);
  const [title, setTitle] = useState('');
  const [zoomCmd, setZoomCmd] = useState(null);
  const [fitCmd, setFitCmd] = useState(null);
  const [printing, setPrinting] = useState(null); // null · 'sending' · 'sent'
  const [mpp, setMpp] = useState(0.5); // meters per pixel for scale bar
  const [scaleCmd, setScaleCmd] = useState(null); // jump map to a target m/px (engineering scale)
  const scaleAppliedRef = useRef(false);
  const [buildings, setBuildings] = useState(null);
  const [sc, setSc] = useState(null); // current scenario
  const [followQ, setFollowQ] = useState('');
  const [followState, setFollowState] = useState(null); // null · {phase:'thinking'|'note'|'err',msg}
  const mapInstanceRef = useRef(null);
  const timers = useRef([]);
  const [digestOpen, setDigestOpen] = useState(false);
  const [digestSeen, setDigestSeen] = useState(false);
  const [toast, setToast] = useState(false);

  // load building footprint GeoJSON once
  useEffect(() => {
    fetch('data/campus-buildings.geojson').then((r) => r.json()).then((gj) => {
      // apply changes pulled from the source ArcGIS web map at the nightly sync
      for (const u of SOURCE_UPDATES) {
        const f = gj.features.find((f) => (f.properties.BD_ID || '').trim() === u.bd);
        if (f) f.properties[u.field] = u.to;
      }
      // re-apply attribute edits saved on this device
      try {
        const log = JSON.parse(localStorage.getItem('campusgeo-edit-log') || '[]');
        for (const e of log) {
          const f = gj.features.find((f) => `${f.properties.BD_ID}|${f.properties.OBJECT_ID}` === e.key);
          if (f) f.properties[e.field] = e.to;
        }
      } catch (err) {}
      setBuildings(gj);
    }).catch(() => {});
  }, []);

  // daily digest — greet with the latest sync's headline change on load
  useEffect(() => {
    timers.current.push(setTimeout(() => setToast(true), 1400));
    timers.current.push(setTimeout(() => setToast(false), 11000));
  }, []);

  const clearTimers = () => {timers.current.forEach(clearTimeout);timers.current = [];};

  const reset = useCallback(() => {
    clearTimers();
    setPhase('idle');setQuery('');setSubmitted('');setShown(0);
    setTraceDone(false);setPrinting(null);setTitle('');setSc(null);
    setFollowQ('');setFollowState(null);setEditState(null);setUnrecMsg(null);
  }, []);

  const UNRECOGNIZED_MSGS = [
  'I couldn\'t match your request to a campus GIS layer. Try a named place ("Keller Center"), a layer ("trees planted last year"), or an attribute filter ("RI above 0.52"). More layers will appear as new GeoJSON data is published.',
  '抱歉，我无法识别您的请求。可以试试具体地点（如 "Keller Center"）、图层（如"去年种植的树木"）或属性筛选（如 "RI 大于 0.52"）。新的 GeoJSON 数据发布后将支持更多图层。'];


  const submit = useCallback((override) => {
    const q = (typeof override === 'string' ? override : query).trim();
    if (!q) return;
    clearTimers();
    const scenario = buildScenario(q, buildings);
    if (!scenario || scenario.unrec) {
      setUnrecMsg(scenario && scenario.msg ? scenario.msg : null);
      setSubmitted(q);setQuery('');setPhase('unrecognized');
      return;
    }
    setUnrecMsg(null);
    setSc(scenario);
    setTitle(scenario.title);
    scaleAppliedRef.current = false;setScaleCmd(null);
    setSubmitted(q);setQuery('');setShown(0);setTraceDone(false);setPhase('thinking');

    // reveal reasoning steps in sequence
    const steps = makeSteps(scenario);
    const cadence = [700, 1150, 1500, 1250, 1100];
    let t = 400;
    steps.forEach((_, i) => {
      timers.current.push(setTimeout(() => setShown(i + 1), t));
      t += cadence[i];
    });
    // mark trace complete, then reveal map + composer
    timers.current.push(setTimeout(() => setTraceDone(true), t));
    timers.current.push(setTimeout(() => {
      if (scenario.kind === 'edit') {setEditState('review');setPhase('editing');} else
      if (scenario.kind === 'sync') setPhase('provenance');else
      setPhase('composing');
      // a requested engineering scale wins over auto-fit (map scenarios only)
      if (scenario.kind !== 'sync' && !scenario.scaleHint) timers.current.push(setTimeout(() => setFitCmd({ ts: Date.now() }), 350));
    }, t + 550));
  }, [query, buildings]);

  const markDigestSeen = useCallback(() => {
    setDigestSeen(true);
  }, []);
  const toggleDigest = useCallback(() => {
    setDigestOpen((o) => {const n = !o;if (n) {setToast(false);markDigestSeen();}return n;});
  }, [markDigestSeen]);
  const viewDigestItem = useCallback((it) => {
    setDigestOpen(false);setToast(false);markDigestSeen();
    if (it && it.open) submit(it.open);
  }, [submit, markDigestSeen]);

  const followUp = useCallback(() => {
    const q = followQ.trim();if (!q) return;
    setFollowState({ phase: 'thinking', msg: 'Scanning layers · matching your refinement…' });
    timers.current.push(setTimeout(() => {
      const res = applyFollowUp(q, sc);
      if (res.err) {setFollowState({ phase: 'err', msg: res.err });return;}
      setSc(res.sc);setFollowQ('');
      setFollowState({ phase: 'note', msg: res.note });
      timers.current.push(setTimeout(() => setFitCmd({ ts: Date.now() }), 300));
      timers.current.push(setTimeout(() => setFollowState(null), 4200));
    }, 1300));
  }, [followQ, sc]);

  const applyEdit = useCallback(() => {
    if (!sc || !sc.edit) return;
    const { field, to, from, key } = sc.edit;
    const upd = (f) => `${f.properties.BD_ID}|${f.properties.OBJECT_ID}` === key ? { ...f, properties: { ...f.properties, [field]: to } } : f;
    setBuildings((prev) => prev ? { ...prev, features: prev.features.map(upd) } : prev);
    const newData = { type: 'FeatureCollection', features: sc.data.features.map(upd) };
    setSc((s) => ({ ...s, data: newData }));
    const map = mapInstanceRef.current;
    if (map && map.getSource && map.getSource('bldg-hit')) map.getSource('bldg-hit').setData(newData);
    try {
      const log = JSON.parse(localStorage.getItem('campusgeo-edit-log') || '[]');
      log.push({ key, field, from, to, ts: Date.now() });
      localStorage.setItem('campusgeo-edit-log', JSON.stringify(log));
    } catch (err) {}
    setEditState('applied');
  }, [sc]);

  const undoEdit = useCallback(() => {
    if (!sc || !sc.edit) return;
    const { field, to, from, key } = sc.edit;
    const rev = (f) => `${f.properties.BD_ID}|${f.properties.OBJECT_ID}` === key ? { ...f, properties: { ...f.properties, [field]: from } } : f;
    setBuildings((prev) => prev ? { ...prev, features: prev.features.map(rev) } : prev);
    const newData = { type: 'FeatureCollection', features: sc.data.features.map(rev) };
    setSc((s) => ({ ...s, data: newData }));
    const map = mapInstanceRef.current;
    if (map && map.getSource && map.getSource('bldg-hit')) map.getSource('bldg-hit').setData(newData);
    try {
      const log = JSON.parse(localStorage.getItem('campusgeo-edit-log') || '[]');
      const sig = (e) => `${e.key}|${e.field}|${e.to}`;
      const i = log.map(sig).lastIndexOf(`${key}|${field}|${to}`);
      if (i >= 0) {log.splice(i, 1);localStorage.setItem('campusgeo-edit-log', JSON.stringify(log));}
    } catch (err) {}
    setEditState('review');
  }, [sc]);

  const onApplyScale = useCallback((tm) => {
    setScaleCmd({ mpp: tm, center: !scaleAppliedRef.current, ts: Date.now() });
    scaleAppliedRef.current = true;
  }, []);

  const onPrint = useCallback(() => {
    setPrinting('sending');
    // capture map canvas and composite print furniture, then download
    const doCapture = () => {
      try {
        const mapCanvas = document.querySelector('.maplibregl-canvas');
        if (!mapCanvas) {setPrinting('sent');timers.current.push(setTimeout(() => reset(), 2000));return;}
        const W = mapCanvas.width,H = mapCanvas.height;
        const dpr = window.devicePixelRatio || 1;
        const c = document.createElement('canvas');
        c.width = W;c.height = H;
        const ctx = c.getContext('2d');
        // draw map
        ctx.drawImage(mapCanvas, 0, 0);
        // semi-transparent vignette
        ctx.fillStyle = 'rgba(26,21,14,0.08)';
        ctx.fillRect(0, 0, W, H);
        const s = dpr; // scale factor
        // title banner
        ctx.fillStyle = 'rgba(250,247,242,0.94)';
        const bannerH = 56 * s,bannerM = 18 * s;
        ctx.beginPath();
        ctx.roundRect(bannerM, bannerM, W - bannerM * 2, bannerH, 8 * s);
        ctx.fill();
        ctx.font = `600 ${22 * s}px "EB Garamond",Georgia,serif`;
        ctx.fillStyle = '#2A2218';
        ctx.fillText(title || 'Campus Map', bannerM + 14 * s, bannerM + 28 * s);
        ctx.font = `400 ${10 * s}px "Plus Jakarta Sans",sans-serif`;
        ctx.fillStyle = '#5A5046';
        ctx.fillText('University of Chicago · Hyde Park Campus · Facilities GIS', bannerM + 14 * s, bannerM + 44 * s);
        // legend box
        if (sc && sc.legend) {
          ctx.font = `600 ${11 * s}px "Plus Jakarta Sans",sans-serif`;
          const maxLbl = Math.max(...sc.legend.map((lg) => {const t = typeof lg.label === 'string' ? lg.label : lg.sub ? 'Other' : 'Match';return ctx.measureText(t).width;}));
          const legW = Math.max(160 * s, maxLbl + 44 * s),legH = (36 + sc.legend.length * 20) * s;
          const lx = bannerM,ly = H - bannerM - legH;
          ctx.fillStyle = 'rgba(250,247,242,0.94)';
          ctx.beginPath();ctx.roundRect(lx, ly, legW, legH, 8 * s);ctx.fill();
          ctx.font = `700 ${9 * s}px "Plus Jakarta Sans",sans-serif`;
          ctx.fillStyle = '#8C8070';
          ctx.fillText('LEGEND', lx + 12 * s, ly + 16 * s);
          sc.legend.forEach((lg, i) => {
            const iy = ly + 28 * s + i * 20 * s;
            ctx.fillStyle = lg.color;
            if (sc.legendSquare && !lg.round) {ctx.fillRect(lx + 12 * s, iy, 10 * s, 10 * s);} else
            {ctx.beginPath();ctx.arc(lx + 17 * s, iy + 5 * s, 5 * s, 0, Math.PI * 2);ctx.fill();}
            ctx.fillStyle = lg.sub ? '#5A5046' : '#2A2218';
            ctx.font = `${lg.sub ? 400 : 600} ${11 * s}px "Plus Jakarta Sans",sans-serif`;
            const txt = typeof lg.label === 'string' ? lg.label : lg.sub ? 'Other' : 'Match';
            ctx.fillText(txt, lx + 30 * s, iy + 10 * s);
          });
        }
        // scale bar
        const sbM = bannerM,sbY = H - bannerM - 10 * s;
        const mppVal = mpp || 0.5;
        const ftpp = mppVal * 3.28084 * dpr;
        const barTarget = 104 * s;
        const rawFt = ftpp * barTarget;
        const nices = [50, 100, 200, 500, 1000, 2000, 2500, 5000, 10000];
        let bestFt = nices[0];
        for (const n of nices) {if (n <= rawFt * 1.3) bestFt = n;else break;}
        const barPx = Math.round(bestFt / ftpp);
        const sbX = W - sbM - barPx - 50 * s;
        ctx.fillStyle = '#2A2218';
        for (let i = 0; i < 4; i++) {if (i % 2 === 0) ctx.fillRect(sbX + i * (barPx / 4), sbY - 6 * s, barPx / 4, 6 * s);}
        ctx.strokeStyle = '#2A2218';ctx.lineWidth = 1;
        ctx.strokeRect(sbX, sbY - 6 * s, barPx, 6 * s);
        ctx.font = `400 ${8 * s}px "JetBrains Mono",monospace`;
        ctx.fillStyle = '#5A5046';
        ctx.fillText('0', sbX, sbY + 10 * s);
        const ftLabel = bestFt >= 5280 ? (bestFt / 5280).toFixed(bestFt % 5280 === 0 ? 0 : 1) + ' mi' : bestFt.toLocaleString() + ' ft';
        ctx.fillText(ftLabel, sbX + barPx - ctx.measureText(ftLabel).width, sbY + 10 * s);
        // North arrow
        const nx = W - sbM - 20 * s,ny = sbY - 30 * s;
        ctx.fillStyle = '#2A2218';
        ctx.beginPath();ctx.moveTo(nx, ny - 18 * s);ctx.lineTo(nx + 7 * s, ny + 6 * s);ctx.lineTo(nx, ny);ctx.closePath();ctx.fill();
        ctx.fillStyle = '#5A5046';
        ctx.beginPath();ctx.moveTo(nx, ny - 18 * s);ctx.lineTo(nx - 7 * s, ny + 6 * s);ctx.lineTo(nx, ny);ctx.closePath();ctx.fill();
        ctx.font = `700 ${11 * s}px "Plus Jakarta Sans",sans-serif`;
        ctx.fillStyle = '#2A2218';
        ctx.fillText('N', nx - 4 * s, ny + 20 * s);
        // trigger download
        c.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (title || 'CampusGeo Map').replace(/[^a-zA-Z0-9 _·\-]/g, '_') + '.png';
          document.body.appendChild(a);a.click();document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setPrinting('sent');
          timers.current.push(setTimeout(() => reset(), 2000));
        }, 'image/png');
      } catch (err) {
        console.error('Print capture failed:', err);
        setPrinting('sent');
        timers.current.push(setTimeout(() => reset(), 2000));
      }
    };
    timers.current.push(setTimeout(doCapture, 800));
  }, [reset, title, sc, mpp]);

  useEffect(() => () => clearTimers(), []);

  const composing = phase === 'composing';
  const mapOn = composing || phase === 'editing';

  return (
    <div style={{ position: 'relative', height: '100vh', width: '100vw', overflow: 'hidden', background: T.paper }}>
      {/* Top bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 54, display: 'flex', alignItems: 'center',
        padding: '0 18px', gap: 12, zIndex: 70, background: mapOn ? 'rgba(245,240,232,0.9)' : 'transparent',
        borderBottom: mapOn ? `1px solid ${T.rule}` : '1px solid transparent', backdropFilter: mapOn ? 'blur(6px)' : 'none', transition: 'all 0.4s' }}>
        <button onClick={reset} style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'none', border: 'none', padding: 0 }}>
          <Phoenix size={36} />
          <div style={{ textAlign: 'left' }}>
            <div style={{ fontFamily: 'EB Garamond,Georgia,serif', fontSize: 18, color: T.maroon, fontWeight: 500, lineHeight: "1", letterSpacing: "0.5px", height: "19px" }}>CampusGeo</div>
            <div style={{ fontSize: 8, color: T.inkLt, letterSpacing: '0.11em', textTransform: 'uppercase', fontWeight: 600, height: "1px", padding: "3px 0px 0px" }}>University of Chicago</div>
          </div>
        </button>
        <div style={{ flex: 1 }} />
        <div style={{ position: 'relative' }}>
          <button onClick={toggleDigest} title="Daily digest" style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, background: digestOpen ? T.paperDk : T.cream, border: `1px solid ${T.rule}`, borderRadius: 8 }}
          onMouseEnter={(e) => e.currentTarget.style.background = T.paperDk} onMouseLeave={(e) => e.currentTarget.style.background = digestOpen ? T.paperDk : T.cream}>
            <Ic n="bell" size={16} color={T.inkMd} />
            {!digestSeen && <span style={{ position: 'absolute', top: 7, right: 7, width: 8, height: 8, borderRadius: '50%', background: T.maroon, border: `1.5px solid ${T.cream}` }} />}
          </button>
          {digestOpen && <DigestPanel onView={viewDigestItem} onClose={() => setDigestOpen(false)} onOpenReport={() => {setDigestOpen(false);submit('When was the campus data last updated?');}} />}
        </div>
        {phase !== 'idle' &&
        <button onClick={reset} style={{ display: 'flex', alignItems: 'center', gap: 6, background: T.cream, border: `1px solid ${T.rule}`, borderRadius: 8, padding: '7px 12px', color: T.inkMd, fontSize: 12, fontWeight: 600 }}
        onMouseEnter={(e) => e.currentTarget.style.background = T.paperDk} onMouseLeave={(e) => e.currentTarget.style.background = T.cream}>
            <Ic n="plus" size={13} color={T.inkMd} />New search
          </button>
        }
      </div>

      {/* Daily digest toast (one-time, on first load of an unseen sync) */}
      {toast && <DigestToast item={DIGEST[0]} onView={() => viewDigestItem(DIGEST[0])} onClose={() => setToast(false)} />}

      {/* Map layer (mounted while composing or reviewing an edit) */}
      {mapOn &&
      <div style={{ position: 'absolute', inset: 0, zIndex: 1, animation: 'ccFade 0.6s ease-out both' }}>
          <MapCanvas sc={sc} visible={true} zoomCmd={zoomCmd} fitCmd={fitCmd} scaleCmd={scaleCmd} onScaleChange={setMpp} mapInstanceRef={mapInstanceRef} />
        </div>
      }

      {/* Print composer overlay */}
      {composing && !printing &&
      <PrintComposer sc={sc} mpp={mpp} title={title} setTitle={setTitle}
      onZoom={(d) => setZoomCmd({ dir: d, ts: Date.now() })}
      onPrint={onPrint} onCancel={reset} onApplyScale={onApplyScale} />
      }

      {/* Follow-up refinement bar (composer only) */}
      {composing && !printing &&
      <div style={{ position: 'absolute', bottom: 84, left: '50%', transform: 'translateX(-50%)', zIndex: 60,
        width: 470, maxWidth: '90vw', display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center',
        animation: 'ccFadeUp 0.4s 0.25s ease-out both' }}>
          {followState &&
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, maxWidth: '100%',
          background: followState.phase === 'err' ? '#FBEFEA' : followState.phase === 'note' ? T.greenBg : T.cream,
          border: `1px solid ${followState.phase === 'err' ? 'rgba(128,0,0,0.25)' : followState.phase === 'note' ? T.greenBd : T.rule}`,
          borderRadius: 20, padding: '6px 14px', fontSize: 12, fontWeight: 500,
          color: followState.phase === 'err' ? T.maroon : followState.phase === 'note' ? T.green : T.inkMd,
          boxShadow: '0 4px 14px rgba(0,0,0,0.12)', animation: 'ccFadeUp 0.25s ease-out both' }}>
              {followState.phase === 'thinking' ?
          <div style={{ width: 12, height: 12, border: `2px solid ${T.amberTint}`, borderTopColor: T.amber, borderRadius: '50%', animation: 'ccSpin 0.7s linear infinite', flexShrink: 0 }} /> :
          <Ic n={followState.phase === 'err' ? 'zap' : 'check'} size={13} color={followState.phase === 'err' ? T.maroon : T.green} />}
              <span style={{ lineHeight: 1.4 }}>{followState.msg}</span>
            </div>
        }
          <div style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 9,
          background: 'rgba(250,247,242,0.95)', border: `1.5px solid ${T.rule}`, borderRadius: 11,
          padding: '3px 3px 3px 13px', boxShadow: '0 8px 28px rgba(0,0,0,0.2)', backdropFilter: 'blur(4px)' }}>
            <Ic n="zap" size={15} color={T.maroon} />
            <input value={followQ}
          onChange={(e) => {setFollowQ(e.target.value);if (followState && followState.phase === 'err') setFollowState(null);}}
          onKeyDown={(e) => e.key === 'Enter' && followUp()}
          placeholder={sc && sc.overlay ? 'Refine again — “remove trees” or change the distance' : 'Ask a follow-up — “also show trees within 200 ft”'}
          style={{ flex: 1, background: 'none', border: 'none', outline: 'none', fontFamily: GOTHAM,
            fontSize: 13.5, fontWeight: 400, letterSpacing: '0.01em', color: followQ ? T.ink : T.inkXlt, minWidth: 0 }} />
            <button onClick={followUp} disabled={!followQ.trim() || followState && followState.phase === 'thinking'}
          style={{ display: 'flex', alignItems: 'center', gap: 5, background: followQ.trim() ? T.maroon : T.paperDkr,
            color: followQ.trim() ? T.white : T.inkLt, border: 'none', borderRadius: 8,
            padding: '8px 13px', fontSize: 12, fontWeight: 700, transition: 'all 0.15s', flexShrink: 0 }}>
              Add<Ic n="arrowUp" size={13} color={followQ.trim() ? T.white : T.inkLt} />
            </button>
          </div>
        </div>
      }

      {/* Edit review card (right-docked, decision-support) */}
      {phase === 'editing' && sc && sc.edit &&
      <EditReview sc={sc} state={editState} onApply={applyEdit} onUndo={undoEdit} onDiscard={reset} onDone={reset} />
      }

      {/* Idle hero + thinking trace + unrecognized (centered column) */}
      {phase !== 'composing' && phase !== 'editing' &&
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', padding: '74px 24px 40px', overflowY: 'auto' }}>
          {phase === 'unrecognized' ?
        <div style={{ width: '100%', maxWidth: 560, textAlign: 'center', animation: 'ccFadeUp 0.4s ease-out both' }}>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 18 }}>
                <div style={{ maxWidth: '85%', background: T.maroon, color: T.white, borderRadius: '14px 14px 4px 14px',
              padding: '11px 16px', fontSize: 16, fontFamily: 'EB Garamond,serif', fontStyle: 'italic', lineHeight: 1.4, boxShadow: '0 3px 12px rgba(128,0,0,0.22)' }}>{submitted}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14, paddingLeft: 2, justifyContent: 'center' }}>
                <div style={{ width: 26, height: 26, borderRadius: 7, background: T.amberTint, border: `1px solid rgba(176,120,48,0.3)`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Ic n="zap" size={14} color={T.amber} /></div>
                <span style={{ fontSize: 11, fontWeight: 700, color: T.amber, letterSpacing: '0.07em', textTransform: 'uppercase' }}>CampusGeo Agent</span>
              </div>
              <div style={{ background: T.cream, border: `1px solid ${T.rule}`, borderRadius: 12, padding: '20px 24px', marginBottom: 20, textAlign: 'left' }}>
                <div style={{ fontSize: 14, color: T.inkMd, lineHeight: 1.6 }}>
                  {unrecMsg || (/[\u4e00-\u9fff]/.test(submitted) ? UNRECOGNIZED_MSGS[1] : UNRECOGNIZED_MSGS[0])}
                </div>
                <div style={{ marginTop: 14, fontSize: 11, color: T.inkXlt }}>Available layers: Campus Buildings (footprints, RI, FCI, CHRS) · Campus Trees (species, year_planted, condition)</div>
              </div>
              <div style={{ marginBottom: 20 }}>
                <SearchBar value={query} onChange={setQuery} onSubmit={() => submit()} big={false} />
              </div>
              <button onClick={reset} style={{ background: 'none', border: `1px solid ${T.rule}`, borderRadius: 8, padding: '8px 16px', fontSize: 13, fontWeight: 600, color: T.inkMd, cursor: 'pointer' }}
          onMouseEnter={(e) => e.currentTarget.style.background = T.paperDk} onMouseLeave={(e) => e.currentTarget.style.background = 'none'}>
                ← Back to start
              </button>
            </div> :
        phase === 'idle' ?
        <div style={{ width: '100%', maxWidth: 620, textAlign: 'center', animation: 'ccFadeUp 0.5s ease-out both' }}>
              <div style={{ display: 'flex', justifyContent: 'center', margin: '0 auto 24px' }}>
                <Phoenix size={84} />
              </div>
              <h1 style={{ fontFamily: 'EB Garamond,Georgia,serif', fontWeight: 500, fontSize: 38, color: T.ink, lineHeight: 1.12, marginBottom: 12, letterSpacing: '-0.01em' }}>
                What can I help you map today?
              </h1>
              <p style={{ fontSize: 15, color: T.inkLt, lineHeight: 1.55, maxWidth: 440, margin: '0 auto 34px' }}>
                Ask in plain language. CampusGeo finds the right campus layer, reads its data, and builds a map or print-ready sheet for you.
              </p>
              <div style={{ marginBottom: 20 }}>
                <SearchBar value={query} onChange={setQuery} onSubmit={() => submit()} big />
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center' }}>
                {suggestions.map((s) =>
            <button key={s} onClick={() => submit(s)} style={{ display: 'flex', alignItems: 'center', gap: 8,
              background: T.cream, border: `1px solid ${T.rule}`, borderRadius: 20, padding: '8px 14px',
              fontFamily: 'EB Garamond,serif', fontStyle: 'italic', fontSize: 14, color: T.inkMd, transition: 'all 0.12s' }}
            onMouseEnter={(e) => {e.currentTarget.style.background = T.paperDk;e.currentTarget.style.borderColor = T.ruleDk;}}
            onMouseLeave={(e) => {e.currentTarget.style.background = T.cream;e.currentTarget.style.borderColor = T.rule;}}>
                    <Ic n="search" size={12} color={T.amber} />{s}
                  </button>
            )}
              </div>
              <button onClick={() => submit('When was the campus data last updated?')}
          style={{ display: 'inline-flex', alignItems: 'center', gap: 9, marginTop: 42, background: 'none', border: 'none', padding: 0,
            fontSize: 10.5, color: T.inkXlt, letterSpacing: '0.03em', transition: 'color 0.15s' }}
          onMouseEnter={(e) => e.currentTarget.style.color = T.inkLt} onMouseLeave={(e) => e.currentTarget.style.color = T.inkXlt}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.green, boxShadow: `0 0 0 3px ${T.greenBg}` }} />
                47 layers · synced from the campus ArcGIS web map · updated today 02:00 CT
              </button>
            </div> :
        phase === 'provenance' ?
        <SyncReport q={submitted} query={query} setQuery={setQuery} onSubmit={() => submit()} /> :

        <ReasoningTrace sc={sc} steps={sc ? makeSteps(sc) : []} query={submitted} shown={shown} done={traceDone} />
        }
        </div>
      }

      {/* Print confirmation overlay */}
      {printing &&
      <div style={{ position: 'absolute', inset: 0, zIndex: 95, background: 'rgba(26,21,14,0.5)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'ccFade 0.3s ease-out both' }}>
          <div style={{ background: T.cream, border: `1px solid ${T.rule}`, borderRadius: 16, padding: '34px 44px',
          textAlign: 'center', boxShadow: '0 20px 60px rgba(0,0,0,0.3)', minWidth: 320, animation: 'ccPop 0.3s ease-out both' }}>
            {printing === 'sending' ?
          <>
                <div style={{ width: 46, height: 46, border: `3px solid ${T.amberTint}`, borderTopColor: T.amber, borderRadius: '50%', margin: '0 auto 18px', animation: 'ccSpin 0.8s linear infinite' }} />
                <div style={{ fontSize: 16, fontWeight: 600, color: T.ink, marginBottom: 5 }}>Preparing your map…</div>
                <div style={{ fontSize: 12.5, color: T.inkLt }}>Rendering “{title}” at print resolution</div>
              </> :

          <>
                <div style={{ width: 52, height: 52, borderRadius: '50%', background: T.greenBg, border: `1.5px solid ${T.greenBd}`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 18px' }}>
                  <Ic n="check" size={26} color={T.green} />
                </div>
                <div style={{ fontSize: 16, fontWeight: 600, color: T.ink, marginBottom: 5 }}>Map downloaded</div>
                <div style={{ fontSize: 12.5, color: T.inkLt }}>“{title}” · {sc ? `${sc.matchCount.toLocaleString()} ${sc.unit}` : 'PNG'}</div>
              </>
          }
          </div>
        </div>
      }

      <TweaksPanel>
        <TweakSection label="Example queries" />
        <TweakSlider label="Number of chips" value={t.exampleCount} min={2} max={6} onChange={(v) => setTweak('exampleCount', v)} />
        <TweakToggle label="Show Chinese example" value={t.showChinese} onChange={(v) => setTweak('showChinese', v)} />
      </TweaksPanel>
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
