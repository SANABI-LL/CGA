/* ── Phoenix mark ────────────────────────────────── */

/* ── Status badge ────────────────────────────────── */
const StatusBadge = ({ status, text }) => {
  const cfg = {
    open:    { bg: T.greenDim, color: T.green, border: 'rgba(46,125,94,0.3)' },
    warning: { bg: T.amberDim, color: T.amberLight, border: 'rgba(196,144,58,0.3)' },
    closed:  { bg: 'rgba(92,82,72,0.2)', color: T.fg3, border: T.border },
    info:    { bg: T.blueDim, color: T.blue, border: 'rgba(37,99,168,0.3)' },
  }[status] || cfg.info;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}`, borderRadius:20, fontSize:10, padding:'2px 9px', fontWeight:500, whiteSpace:'nowrap' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:cfg.color, flexShrink:0 }}/>
      {text}
    </span>
  );
};

/* ── Map Canvas (simulated) ──────────────────────── */
const MapCanvas = ({ results, selectedId, onSelect }) => {

  // Simulated dark campus map using CSS + SVG paths
  return (
    <div style={{ position:'relative', flex:1, overflow:'hidden', background:'#1A1714' }}>
      {/* Map grid lines */}
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0, opacity:0.06 }}>

            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#B9B0A2" strokeWidth="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
      </svg>

      {/* Campus block outlines */}
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }} viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
        {/* Streets */}
        <line x1="0" y1="150" x2="800" y2="150" stroke="#2E2A27" strokeWidth="18"/>
        <line x1="0" y1="300" x2="800" y2="300" stroke="#2E2A27" strokeWidth="18"/>
        <line x1="0" y1="450" x2="800" y2="450" stroke="#2E2A27" strokeWidth="14"/>
        <line x1="120" y1="0" x2="120" y2="600" stroke="#2E2A27" strokeWidth="14"/>
        <line x1="300" y1="0" x2="300" y2="600" stroke="#2E2A27" strokeWidth="14"/>
        <line x1="480" y1="0" x2="480" y2="600" stroke="#2E2A27" strokeWidth="14"/>
        <line x1="660" y1="0" x2="660" y2="600" stroke="#2E2A27" strokeWidth="14"/>
        {/* Main Quad outline */}
        <rect x="160" y="170" width="290" height="110" fill="none" stroke="#3D3530" strokeWidth="1.5" strokeDasharray="4 3"/>
        <rect x="165" y="175" width="280" height="100" fill="#1E1B18" stroke="none"/>
        {/* Buildings */}
        {[
          [140,165,50,60],[200,165,60,60],[270,165,60,60],[340,165,60,60],[410,165,50,60],
          [140,295,80,70],[235,295,70,70],[320,295,50,70],[385,295,80,70],
          [500,160,100,80],[500,295,100,80],[620,160,80,80],[620,295,80,80],
          [140,445,70,60],[230,445,80,60],[325,445,60,60],[400,445,90,60],
          [500,440,90,70],[620,440,80,70],
        ].map(([x,y,w,h],i) => (
          <rect key={i} x={x} y={y} width={w} height={h} fill="#242020" stroke="#3D3530" strokeWidth="0.8" rx="2"/>
        ))}
        {/* Quad green */}
        <rect x="165" y="175" width="280" height="100" fill="#1E1B18"/>
        <text x="305" y="230" textAnchor="middle" fill="#3D3530" fontSize="11" fontFamily="'Plus Jakarta Sans',sans-serif" fontWeight="500">MAIN QUAD</text>
        {/* Label streets */}
        <text x="400" y="144" textAnchor="middle" fill="#5C5248" fontSize="9" fontFamily="'Plus Jakarta Sans',sans-serif">E 57th St</text>
        <text x="400" y="294" textAnchor="middle" fill="#5C5248" fontSize="9" fontFamily="'Plus Jakarta Sans',sans-serif">E 59th St</text>
        <text x="400" y="444" textAnchor="middle" fill="#5C5248" fontSize="9" fontFamily="'Plus Jakarta Sans',sans-serif">E 61st St</text>
        <text x="114" y="360" textAnchor="middle" fill="#5C5248" fontSize="9" fontFamily="'Plus Jakarta Sans',sans-serif" transform="rotate(-90,114,360)">S University Ave</text>
        <text x="294" y="360" textAnchor="middle" fill="#5C5248" fontSize="9" fontFamily="'Plus Jakarta Sans',sans-serif" transform="rotate(-90,294,360)">S Ellis Ave</text>
      </svg>

      {/* Markers */}
      {markers.map((r, i) => {
        // Distribute markers across the map
        const positions = [
          [38,52], [44,56], [52,60], [36,66], [58,68],
          [42,44], [36,38], [60,52], [42,62], [54,44],
          [48,72], [38,48], [62,62], [44,38], [52,48],
          [58,54], [46,66], [56,42],
        ];
        const [left, top] = positions[i % positions.length];
        const isSelected = r.id === selectedId;
        return (
          <div
            key={r.id}
            onClick={() => onSelect(r.id === selectedId ? null : r.id)}
            style={{
              position:'absolute', left:`${left}%`, top:`${top}%`,

              transition:'all 0.2s',

              <Icon name="mapPin" size={isSelected ? 16 : 12} color={isSelected ? 'white' : r.color}/>
            </div>
            {isSelected && (
              <div style={{
                position:'absolute', bottom:'calc(100% + 8px)', left:'50%', transform:'translateX(-50%)',
                background: T.raised, border:`1px solid ${T.border}`, borderRadius:6,
                padding:'5px 10px', whiteSpace:'nowrap', fontSize:12, fontWeight:600, color:T.fg1,
                boxShadow:'0 4px 16px rgba(0,0,0,0.5)',
              }}>
                {r.name}
              </div>
            )}
          </div>
        );
      })}

      {/* Scale bar */}
      <div style={{ position:'absolute', bottom:16, left:16, display:'flex', alignItems:'center', gap:6 }}>
        <div style={{ width:60, height:3, background:T.fg3, borderRadius:2 }}/>
        <span style={{ fontSize:10, color:T.fg3, fontFamily:'JetBrains Mono,monospace' }}>0.25 mi</span>
      </div>

      {/* Compass */}
      <div style={{ position:'absolute', bottom:16, right:16, background:T.surface, border:`1px solid ${T.border}`, borderRadius:'50%', width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name="compass" size={18} color={T.fg3}/>
      </div>

      {/* Attribution */}
      <div style={{ position:'absolute', bottom:16, left:'50%', transform:'translateX(-50%)', fontSize:9, color:T.fg4, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
        University of Chicago Campus · OpenStreetMap contributors
      </div>
    </div>
  );
};

/* ── Query Bar ───────────────────────────────────── */
const QueryBar = ({ value, onChange, onSubmit, loading }) => {
  const [focused, setFocused] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(false);

  const handleKey = (e) => { if (e.key === 'Enter') { onSubmit(); setShowSuggestions(false); } };

  return (
    <div style={{ position:'relative' }}>
      <div style={{
        display:'flex', alignItems:'center', gap:10,
        background: T.surface,
        border:`1px solid ${focused ? T.maroon : T.border}`,
        borderRadius:8,
        padding:'10px 14px',
        boxShadow: focused ? `0 0 0 2px rgba(128,0,0,0.2)` : 'none',
        transition:'border-color 0.15s, box-shadow 0.15s',
      }}>
        <Icon name="zap" size={18} color={loading ? T.amber : T.fg3}/>
        <input
          value={value}
          onChange={e => onChange(e.target.value)}
          onFocus={() => { setFocused(true); setShowSuggestions(true); }}
          onBlur={() => { setFocused(false); setTimeout(() => setShowSuggestions(false), 150); }}
          onKeyDown={handleKey}
          placeholder="Ask anything about campus…"
          style={{
            flex:1, background:'none', border:'none', outline:'none',
            fontFamily:'EB Garamond, Georgia, serif', fontStyle:'italic',
            fontSize:17, color: value ? T.fg1 : T.fg4,
          }}
        />
        {value && (
          <button onClick={() => onChange('')} style={{ background:'none', border:'none', cursor:'pointer', color:T.fg3, display:'flex', padding:0 }}>
            <Icon name="x" size={15} color={T.fg3}/>
          </button>
        )}
        <button
          onClick={() => { onSubmit(); setShowSuggestions(false); }}
          disabled={!value.trim()}
          style={{
            background: value.trim() ? T.maroon : T.overlay,
            color: 'white', border:'none', borderRadius:6,
            padding:'6px 16px', fontSize:13, fontWeight:500, cursor: value.trim() ? 'pointer' : 'default',
            transition:'background 0.15s', flexShrink:0,
            fontFamily:'Plus Jakarta Sans, sans-serif',
            boxShadow: value.trim() ? '0 2px 8px rgba(128,0,0,0.4)' : 'none',
          }}
        >
          {loading ? '…' : 'Ask →'}
        </button>
      </div>

      {showSuggestions && !value && (
        <div style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, right:0,
          background:T.raised, border:`1px solid ${T.border}`, borderRadius:8,
          padding:8, zIndex:50, boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
        }}>
          <div style={{ fontSize:10, color:T.fg4, textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600, padding:'2px 8px 6px', fontFamily:'Plus Jakarta Sans,sans-serif' }}>Suggested queries</div>
          {SUGGESTIONS.map(s => (
            <div key={s}
              onMouseDown={() => { onChange(s); setShowSuggestions(false); }}
              style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', borderRadius:6, cursor:'pointer', color:T.fg2, fontSize:14 }}
              onMouseEnter={e => e.currentTarget.style.background=T.overlay}
              onMouseLeave={e => e.currentTarget.style.background='transparent'}
            >
              <Icon name="search" size={13} color={T.fg4}/>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ── Result Card ─────────────────────────────────── */
const ResultCard = ({ result, selected, onClick }) => (
  <div onClick={onClick} style={{
    display:'flex', gap:0, background: selected ? `rgba(128,0,0,0.08)` : T.raised,
    border:`1px solid ${selected ? 'rgba(128,0,0,0.35)' : T.border}`,
    borderRadius:8, overflow:'hidden', cursor:'pointer', marginBottom:8,
    boxShadow:'0 2px 6px rgba(0,0,0,0.25)',
    transition:'all 0.15s',
  }}>
    <div style={{ width:4, background:result.color, flexShrink:0 }}/>
    <div style={{ padding:'10px 12px', flex:1, minWidth:0 }}>
      <div style={{ fontSize:13, fontWeight:600, color:T.fg1, marginBottom:2, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{result.name}</div>
      <div style={{ fontSize:11, color:T.fg3, marginBottom:7, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
        {result.sub} · {result.dist}
      </div>
      <StatusBadge status={result.status} text={result.statusText}/>
    </div>
    <div style={{ display:'flex', alignItems:'center', padding:'0 10px', color:T.fg4 }}>
      <Icon name="chevronRight" size={14}/>
    </div>
  </div>
);

/* ── Layer Toggle ────────────────────────────────── */
const LayerToggle = ({ layer, onToggle }) => (
  <div style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', borderRadius:6, border:`1px solid ${T.border}`, background:T.raised, marginBottom:6 }}>
    <div style={{ width:10, height:10, borderRadius:3, background:layer.color, flexShrink:0 }}/>
    <span style={{ flex:1, fontSize:12, color:T.fg1, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{layer.label}</span>
    <div
      onClick={onToggle}
      style={{
        width:30, height:17, borderRadius:9, background: layer.on ? T.maroon : T.overlay,
        position:'relative', cursor:'pointer', transition:'background 0.2s', flexShrink:0,
      }}
    >
      <div style={{
        position:'absolute', top:2.5, left: layer.on ? 'calc(100% - 14.5px)' : 2.5,
        width:12, height:12, borderRadius:'50%', background:'white',
        transition:'left 0.2s', boxShadow:'0 1px 3px rgba(0,0,0,0.3)',
      }}/>
    </div>
  </div>
);

/* ── Screens ─────────────────────────────────────── */
const LandingScreen = ({ onStart }) => (
  <div style={{
    position:'absolute', inset:0, background:T.canvas,
    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
    zIndex:100,
  }}>
    {/* Subtle background grid */}
    <svg style={{ position:'absolute', inset:0, opacity:0.04, width:'100%', height:'100%' }}>
      <defs><pattern id="g2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B9B0A2" strokeWidth="0.5"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#g2)"/>
    </svg>

    <div style={{ textAlign:'center', maxWidth:520, padding:'0 32px', position:'relative', zIndex:1 }}>
      <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
        <div style={{ background:T.maroon, borderRadius:16, width:72, height:72, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 24px rgba(128,0,0,0.5)' }}>
          <PhoenixMark size={40} color="white"/>
        </div>
      </div>
      <div style={{ fontSize:11, color:T.fg4, letterSpacing:'0.14em', textTransform:'uppercase', fontWeight:600, marginBottom:12, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
        University of Chicago
      </div>
      <h1 style={{ fontFamily:'EB Garamond, Georgia, serif', fontSize:54, fontWeight:400, color:T.fg1, lineHeight:1.1, letterSpacing:'-0.02em', marginBottom:12 }}>
        CampusGeo
      </h1>
      <p style={{ fontFamily:'EB Garamond, Georgia, serif', fontStyle:'italic', fontSize:20, color:T.fg2, lineHeight:1.6, marginBottom:36 }}>
        Ask anything about campus in plain English.<br/>Get instant maps, hours, and locations.
      </p>

      {/* Sample queries */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, justifyContent:'center', marginBottom:36 }}>
        {SUGGESTIONS.map(s => (
          <button key={s} onClick={() => onStart(s)} style={{
            background:T.raised, border:`1px solid ${T.border}`, borderRadius:20,
            padding:'6px 14px', fontSize:13, color:T.fg2, cursor:'pointer',
            fontFamily:'Plus Jakarta Sans,sans-serif',
            transition:'all 0.15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.background=T.overlay; e.currentTarget.style.color=T.fg1; }}
          onMouseLeave={e => { e.currentTarget.style.background=T.raised; e.currentTarget.style.color=T.fg2; }}
          >{s}</button>
        ))}
      </div>

      <button onClick={() => onStart('')} style={{
        background:T.maroon, color:'white', border:'none', borderRadius:8,
        padding:'13px 32px', fontSize:15, fontWeight:600, cursor:'pointer',
        fontFamily:'Plus Jakarta Sans,sans-serif',
        boxShadow:'0 4px 20px rgba(128,0,0,0.45)',
        transition:'background 0.15s, transform 0.1s',
        display:'inline-flex', alignItems:'center', gap:8,
      }}
      onMouseEnter={e => { e.currentTarget.style.background=T.maroonHover; e.currentTarget.style.transform='translateY(-1px)'; }}
      onMouseLeave={e => { e.currentTarget.style.background=T.maroon; e.currentTarget.style.transform='translateY(0)'; }}
      >
        <Icon name="zap" size={18} color="white"/>
        Open Campus Map
      </button>
    </div>
  </div>
);

/* ── Main App ────────────────────────────────────── */
const App = () => {
  const [screen, setScreen] = useState('landing'); // landing | app
  const [query, setQuery] = useState('');
  const [activeQueryId, setActiveQueryId] = useState(1);
  const [selectedResultId, setSelectedResultId] = useState(null);
  const [layers, setLayers] = useState(LAYERS);
  const [rightPanel, setRightPanel] = useState('results'); // results | layers
  const [loading, setLoading] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [initQuery, setInitQuery] = useState('');

  const currentResults = RESULTS_BY_QUERY[activeQueryId] || [];
  const currentQuery = QUERIES.find(q => q.id === activeQueryId);

  const handleStart = (q) => {
    setInitQuery(q);
    setScreen('app');
    if (q) {
      setQuery(q);
      setLoading(true);
      setTimeout(() => {
        setActiveQueryId(1);
        setLoading(false);
      }, 900);
    }
  };

  const handleSubmit = () => {
    if (!query.trim()) return;
    setLoading(true);
    setSelectedResultId(null);
    setTimeout(() => {
      // Pick a matching query by index
      const idx = QUERIES.findIndex(q => q.text.toLowerCase().includes(query.toLowerCase().split(' ')[0]));
      setActiveQueryId(idx >= 0 ? QUERIES[idx].id : 1);
      setLoading(false);
    }, 1200);
  };

  const toggleLayer = (id) => {
    setLayers(ls => ls.map(l => l.id === id ? { ...l, on: !l.on } : l));
  };

  if (screen === 'landing') return <LandingScreen onStart={handleStart}/>;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>

      {/* Top Bar */}
      <div style={{ background:T.maroon, height:52, display:'flex', alignItems:'center', padding:'0 16px', gap:12, flexShrink:0, zIndex:20, boxShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>
        <button onClick={() => setSidebarOpen(o => !o)} style={{ background:'rgba(255,255,255,0.1)', border:'none', borderRadius:6, padding:'5px', cursor:'pointer', color:'white', display:'flex' }}>
          <Icon name="menu" size={18} color="white"/>
        </button>
        <PhoenixMark size={22} color="white"/>
        <div>
          <div style={{ fontFamily:'EB Garamond, Georgia, serif', fontSize:18, color:'white', lineHeight:1.1 }}>CampusGeo</div>
          <div style={{ fontSize:9, color:'rgba(255,255,255,0.6)', letterSpacing:'0.1em', textTransform:'uppercase', fontFamily:'Plus Jakarta Sans,sans-serif' }}>University of Chicago</div>
        </div>
        <div style={{ flex:1, maxWidth:500, margin:'0 auto' }}>
          <QueryBar value={query} onChange={setQuery} onSubmit={handleSubmit} loading={loading}/>
        </div>
        <div style={{ display:'flex', gap:6, marginLeft:'auto' }}>
          <button style={{ background:'rgba(255,255,255,0.1)', border:'none', borderRadius:6, padding:'7px', cursor:'pointer', display:'flex' }}>
            <Icon name="star" size={16} color="white"/>
          </button>
          <div style={{ width:30, height:30, borderRadius:'50%', background:'rgba(255,255,255,0.2)', display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:13, fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif' }}>JS</div>
        </div>
      </div>

      {/* Main layout */}
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

        {/* Left sidebar — query history */}
        {sidebarOpen && (
          <div style={{ width:260, background:T.surface, borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden' }}>
            <div style={{ padding:'12px 12px 8px', borderBottom:`1px solid ${T.border}` }}>
              <div style={{ fontSize:9, color:T.fg4, textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif', marginBottom:8 }}>Recent Queries</div>
              <button style={{ width:'100%', background:T.maroon, border:'none', borderRadius:6, padding:'8px 12px', color:'white', fontSize:13, fontWeight:500, cursor:'pointer', display:'flex', alignItems:'center', gap:8, fontFamily:'Plus Jakarta Sans,sans-serif' }}
                onClick={() => { setQuery(''); }}>
                <Icon name="zap" size={14} color="white"/>
                New query
              </button>
            </div>
            <div style={{ flex:1, overflowY:'auto', padding:8 }}>
              {QUERIES.map(q => (
                <div key={q.id} onClick={() => { setActiveQueryId(q.id); setSelectedResultId(null); }} style={{
                  padding:'9px 10px', borderRadius:6, marginBottom:4, cursor:'pointer',
                  background: q.id === activeQueryId ? T.maroonDim : 'transparent',
                  borderLeft: q.id === activeQueryId ? `2px solid ${T.maroon}` : '2px solid transparent',
                  transition:'background 0.15s',
                }}
                onMouseEnter={e => { if (q.id !== activeQueryId) e.currentTarget.style.background=T.raised; }}
                onMouseLeave={e => { if (q.id !== activeQueryId) e.currentTarget.style.background='transparent'; }}
                >
                  <div style={{ fontSize:12, color:T.fg1, fontFamily:'Plus Jakarta Sans,sans-serif', lineHeight:1.4 }}>{q.text}</div>
                  <div style={{ fontSize:10, color:T.fg4, marginTop:3, fontFamily:'JetBrains Mono,monospace' }}>{q.time} · {q.count} result{q.count !== 1 ? 's' : ''}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Map canvas */}
        <MapCanvas results={currentResults} selectedId={selectedResultId} onSelect={setSelectedResultId}/>

        {/* Right panel */}
        <div style={{ width:340, background:T.surface, borderLeft:`1px solid ${T.border}`, display:'flex', flexDirection:'column', flexShrink:0, overflow:'hidden' }}>

          {/* Panel tabs */}
          <div style={{ display:'flex', borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
            {[
              { id:'results', label:'Results', icon:'mapPin' },
              { id:'layers', label:'Layers', icon:'layers' },
            ].map(tab => (
              <button key={tab.id} onClick={() => setRightPanel(tab.id)} style={{
                flex:1, padding:'12px 8px', background:'none', border:'none',
                borderBottom: rightPanel === tab.id ? `2px solid ${T.maroon}` : '2px solid transparent',
                color: rightPanel === tab.id ? T.fg1 : T.fg3,
                cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                fontSize:13, fontWeight: rightPanel === tab.id ? 600 : 400,
                fontFamily:'Plus Jakarta Sans,sans-serif',
                transition:'color 0.15s',
              }}>
                <Icon name={tab.icon} size={14} color={rightPanel === tab.id ? T.maroon : T.fg3}/>
                {tab.label}
              </button>
            ))}
          </div>

          {rightPanel === 'results' && (
            <div style={{ flex:1, overflowY:'auto', padding:12 }}>
              {loading ? (
                <div style={{ textAlign:'center', padding:'40px 0', color:T.fg3, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
                  <div style={{ fontSize:24, marginBottom:8 }}>
                    <Icon name="zap" size={28} color={T.amber}/>
                  </div>
                  <div style={{ fontSize:13, color:T.amber, fontWeight:500 }}>Analyzing campus data…</div>
                  <div style={{ fontSize:11, color:T.fg4, marginTop:4 }}>Processing your query</div>
                </div>
              ) : (
                <>
                  <div style={{ fontSize:11, color:T.fg3, marginBottom:10, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
                    {currentResults.length} location{currentResults.length !== 1 ? 's' : ''} · {currentQuery?.text}
                  </div>
                  {currentResults.map(r => (
                    <ResultCard key={r.id} result={r} selected={r.id === selectedResultId} onClick={() => setSelectedResultId(r.id === selectedResultId ? null : r.id)}/>
                  ))}
                </>
              )}
            </div>
          )}

          {rightPanel === 'layers' && (
            <div style={{ flex:1, overflowY:'auto', padding:12 }}>
              <div style={{ fontSize:11, color:T.fg3, marginBottom:10, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
                Toggle campus data layers on the map
              </div>
              {layers.map(l => (
                <LayerToggle key={l.id} layer={l} onToggle={() => toggleLayer(l.id)}/>
              ))}
              <div style={{ marginTop:12, padding:'10px 12px', background:T.raised, borderRadius:8, border:`1px solid ${T.border}` }}>
                <div style={{ fontSize:11, fontWeight:600, color:T.fg2, marginBottom:4, fontFamily:'Plus Jakarta Sans,sans-serif' }}>Data sources</div>
                <div style={{ fontSize:10, color:T.fg4, lineHeight:1.6, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
                  UChicago Campus Operations · OpenStreetMap · UChicago Dining Services · UChicago Library System
                </div>
              </div>
            </div>
          )}

          {/* Selected result detail */}
          {selectedResultId && rightPanel === 'results' && (() => {
            const r = currentResults.find(x => x.id === selectedResultId);
            if (!r) return null;
            return (
              <div style={{ borderTop:`1px solid ${T.border}`, background:T.raised, padding:14, flexShrink:0 }}>
                <div style={{ fontSize:10, color:T.fg4, textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif', marginBottom:8 }}>Selected location</div>
                <div style={{ fontSize:14, fontWeight:600, color:T.fg1, marginBottom:2, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{r.name}</div>
                <div style={{ fontSize:11, color:T.fg3, marginBottom:8, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{r.sub}</div>
                <div style={{ display:'flex', gap:6 }}>
                  <button style={{ flex:1, background:T.maroon, color:'white', border:'none', borderRadius:6, padding:'7px 10px', fontSize:12, fontWeight:500, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:5, fontFamily:'Plus Jakarta Sans,sans-serif' }}>
                    <Icon name="route" size={13} color="white"/> Directions
                  </button>
                  <button style={{ background:T.overlay, color:T.fg2, border:`1px solid ${T.border}`, borderRadius:6, padding:'7px 12px', fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', fontFamily:'Plus Jakarta Sans,sans-serif', gap:5 }}>
                    <Icon name="info" size={13} color={T.fg3}/> Details
                  </button>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
