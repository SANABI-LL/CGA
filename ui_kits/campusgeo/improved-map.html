const Badge=({status,text,size='sm'})=>{
  const cfg={
    open:{bg:C.greenDim,c:C.green,b:C.greenBorder},
    warning:{bg:C.amberDim,c:C.amberLight,b:'rgba(196,144,58,0.3)'},
    closed:{bg:'rgba(60,54,50,0.6)',c:C.fg3,b:C.border},
    info:{bg:C.blueDim,c:C.blue,b:C.blueBorder},
    accessible:{bg:C.purpleDim,c:C.purple,b:C.purpleBorder},
  }[status]||{bg:C.blueDim,c:C.blue,b:C.blueBorder};
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:cfg.bg,color:cfg.c,border:`1px solid ${cfg.b}`,borderRadius:20,fontSize:size==='sm'?10:12,fontWeight:500,padding:size==='sm'?'2px 9px':'4px 12px',whiteSpace:'nowrap'}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:cfg.c,flexShrink:0}}/>
      {text}
    </span>
  );
};

/* ─── Layer panel ─────────────────────────── */
const LayerPanel=({groups,setGroups,layerSearch,setLayerSearch})=>{
  const [openGroups,setOpenGroups]=useState(
    Object.fromEntries(LAYER_GROUPS.map(g=>[g.id,g.defaultOpen]))
  );
  const [hoveredLayer,setHoveredLayer]=useState(null);

  const toggleGroup=id=>setOpenGroups(s=>({...s,[id]:!s[id]}));
  const toggleLayer=(gid,lid)=>{
    setGroups(gs=>gs.map(g=>g.id===gid
      ?{...g,layers:g.layers.map(l=>l.id===lid?{...l,on:!l.on}:l)}
      :g
    ));
  };
  const setOpacity=(gid,lid,val)=>{
    setGroups(gs=>gs.map(g=>g.id===gid
      ?{...g,layers:g.layers.map(l=>l.id===lid?{...l,opacity:val}:l)}
      :g
    ));
  };

  const filtered=useMemo(()=>{
    if(!layerSearch.trim()) return groups;
    const q=layerSearch.toLowerCase();
    return groups.map(g=>({
      ...g,
      layers:g.layers.filter(l=>l.label.toLowerCase().includes(q))
    })).filter(g=>g.layers.length>0||g.label.toLowerCase().includes(q));
  },[groups,layerSearch]);

  const activeCount=groups.reduce((acc,g)=>acc+g.layers.filter(l=>l.on).length,0);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'12px 14px 8px',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <Ic name="layers" size={15} color={C.maroon}/>
            <span style={{fontSize:13,fontWeight:600,color:C.fg1}}>Map Layers</span>
          </div>
          <span style={{fontSize:11,color:C.fg3,fontWeight:500,background:C.overlay,borderRadius:20,padding:'1px 8px'}}>
            {activeCount} active
          </span>
        </div>
        {/* Search */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:C.canvas,border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 10px'}}>
          <Ic name="search" size={13} color={C.fg4}/>
          <input value={layerSearch} onChange={e=>setLayerSearch(e.target.value)}
            placeholder="Filter layers…"
            style={{background:'none',border:'none',outline:'none',flex:1,fontSize:12,color:layerSearch?C.fg1:C.fg4}}
          />
          {layerSearch&&<button onClick={()=>setLayerSearch('')} style={{background:'none',border:'none',padding:0,display:'flex',color:C.fg4}}><Ic name="x" size={12} color={C.fg4}/></button>}
        </div>
      </div>

      {/* Layer groups list */}
      <div style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
        {filtered.map(group=>{
          const isOpen=openGroups[group.id];
          const activeInGroup=group.layers.filter(l=>l.on).length;
          return(
            <div key={group.id}>
              {/* Group header */}
              <button onClick={()=>toggleGroup(group.id)} style={{
                width:'100%',display:'flex',alignItems:'center',gap:8,
                padding:'8px 14px',background:'none',border:'none',
                cursor:'pointer',textAlign:'left',
                borderBottom:isOpen?'none':`1px solid ${C.border}`,
              }}
              onMouseEnter={e=>e.currentTarget.style.background=C.raised}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <Ic name={group.icon} size={14} color={C.fg3}/>
                <span style={{flex:1,fontSize:12,fontWeight:600,color:C.fg2,letterSpacing:'0.01em'}}>{group.label}</span>
                {activeInGroup>0&&(
                  <span style={{fontSize:10,background:C.maroonDim,color:C.maroon,border:`1px solid rgba(128,0,0,0.25)`,borderRadius:20,padding:'0 6px',fontWeight:600}}>{activeInGroup}</span>
                )}
                <Ic name={isOpen?'chevronDown':'chevronRight'} size={13} color={C.fg4}/>
              </button>

              {/* Layers in group */}
              {isOpen&&group.layers.map(layer=>{
                const isHov=hoveredLayer===layer.id;
                return(
                  <div key={layer.id}
                    onMouseEnter={()=>setHoveredLayer(layer.id)}
                    onMouseLeave={()=>setHoveredLayer(null)}
                    style={{padding:'0 14px 0 36px',background:isHov?C.canvas:'transparent',transition:'background 0.12s'}}
                  >
                    <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:6,paddingBottom:layer.on&&isHov?2:6}}>
                      {/* Color swatch */}
                      <div style={{width:10,height:10,borderRadius:2,background:layer.color,flexShrink:0,opacity:layer.on?1:0.35}}/>
                      {/* Label */}
                      <span style={{flex:1,fontSize:12,color:layer.on?C.fg1:C.fg3,transition:'color 0.15s'}}>{layer.label}</span>
                      {/* Count */}
                      <span style={{fontSize:10,color:C.fg4,fontFamily:'JetBrains Mono,monospace',marginRight:4}}>{layer.count}</span>
                      {/* Toggle */}
                      <div onClick={()=>toggleLayer(group.id,layer.id)} style={{
                        width:28,height:16,borderRadius:8,
                        background:layer.on?C.maroon:C.overlay,
                        position:'relative',cursor:'pointer',transition:'background 0.2s',flexShrink:0,
                      }}>
                        <div style={{
                          position:'absolute',top:2,left:layer.on?'calc(100% - 14px)':2,
                          width:12,height:12,borderRadius:'50%',background:'white',
                          transition:'left 0.2s',boxShadow:'0 1px 3px rgba(0,0,0,0.3)',
                        }}/>
                      </div>
                    </div>
                    {/* Opacity slider — shown on hover when layer is on */}
                    {layer.on&&isHov&&(
                      <div style={{display:'flex',alignItems:'center',gap:8,paddingBottom:6}}>
                        <Ic name="eye" size={11} color={C.fg4}/>
                        <input type="range" min="10" max="100" value={layer.opacity}
                          onChange={e=>setOpacity(group.id,layer.id,+e.target.value)}
                          style={{flex:1,height:2,accentColor:C.maroon,cursor:'pointer'}}
                        />
                        <span style={{fontSize:10,color:C.fg4,fontFamily:'JetBrains Mono,monospace',width:28,textAlign:'right'}}>{layer.opacity}%</span>
                      </div>
                    )}
                  </div>
                );
              })}
              {isOpen&&<div style={{borderBottom:`1px solid ${C.border}`,margin:'4px 0'}}/>}
            </div>
          );
        })}
        {filtered.length===0&&(
          <div style={{padding:'24px 14px',textAlign:'center',color:C.fg4,fontSize:12}}>No layers match "{layerSearch}"</div>
        )}
      </div>

      {/* Legend hint */}
      <div style={{padding:'8px 14px',borderTop:`1px solid ${C.border}`,fontSize:10,color:C.fg4,flexShrink:0}}>
        <span style={{fontWeight:600,color:C.fg3}}>Data: </span>UChicago Campus Ops · Facilities Services · Dining Services
      </div>
    </div>
  );
};

const AISearchBar=({value,onChange,onSubmit,loading,onHistoryClick})=>{

  const SUG=['Dining near the main quad','Libraries open after 9pm','Accessible entrances nearby','Parking near Booth School','EV charging stations'];
  return(
    <div style={{position:'relative',flex:1,maxWidth:580}}>
      <div style={{
        display:'flex',alignItems:'center',gap:10,
        background:focused?C.raised:C.surface,
        border:`1px solid ${focused?C.maroon:C.border}`,
        borderRadius:8,padding:'7px 12px',height:38,
        boxShadow:focused?`0 0 0 2px ${C.maroonRing}`:'none',
        transition:'all 0.15s',
      }}>
        <Ic name="zap" size={15} color={loading?C.amber:C.fg3}/>
        <input value={value} onChange={e=>onChange(e.target.value)}
          onFocus={()=>{setFocused(true);setShowDrop(true);}}

          onKeyDown={e=>e.key==='Enter'&&onSubmit()}

        <button onClick={()=>onHistoryClick()} title="History" style={{background:'none',border:'none',display:'flex',padding:0}}><Ic name="clock" size={14} color={C.fg4}/></button>
        <button onClick={onSubmit} disabled={!value.trim()} style={{
          background:value.trim()?C.maroon:C.overlay,color:'white',border:'none',
          borderRadius:5,padding:'4px 12px',fontSize:12,fontWeight:500,
          transition:'background 0.15s',flexShrink:0,
          boxShadow:value.trim()?'0 2px 8px rgba(128,0,0,0.4)':'none',
        }}>
          {loading?'…':'Ask →'}
        </button>
      </div>
      {showDrop&&!value&&(
        <div style={{
          position:'absolute',top:'calc(100% + 6px)',left:0,right:0,
          background:C.raised,border:`1px solid ${C.border}`,borderRadius:8,
          padding:'6px 0',zIndex:100,boxShadow:'0 8px 28px rgba(0,0,0,0.5)',
        }}>
          <div style={{fontSize:9,color:C.fg4,padding:'4px 12px 6px',letterSpacing:'0.08em',textTransform:'uppercase',fontWeight:600}}>Suggested</div>
          {SUG.map(s=>(
            <div key={s} onMouseDown={()=>{onChange(s);setShowDrop(false);}}
              style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',cursor:'pointer',fontSize:13,color:C.fg2}}
              onMouseEnter={e=>e.currentTarget.style.background=C.overlay}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              <Ic name="search" size={12} color={C.fg4}/>{s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

  {x:12,y:42,label:'ArcGIS: flat layer list, no groups or search',fix:'Grouped layers with opacity, count, and filter'},
  {x:48,y:8,label:'ArcGIS: no AI/NL search — address lookup only',fix:'Natural language query bar with history & suggestions'},
  {x:78,y:62,label:'ArcGIS: attribute table popup — raw key/value dump',fix:'Rich info cards with quick actions, amenities, stats'},
  {x:50,y:88,label:'ArcGIS: light basemap washes out map features',fix:'Dark map-first layout with warm UChicago surfaces'},
];

const AnnotationsOverlay=({visible})=>{
  if(!visible)return null;
  return(
    <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:50}}>
      {ANNOTATIONS.map((a,i)=>(
        <div key={i} style={{position:'absolute',left:`${a.x}%`,top:`${a.y}%`,transform:'translate(-50%,-50%)'}}>
          <div style={{
            background:'rgba(196,144,58,0.95)',color:'#1A1714',
            borderRadius:6,padding:'5px 10px',fontSize:10,fontWeight:600,
            maxWidth:200,lineHeight:1.4,boxShadow:'0 3px 12px rgba(0,0,0,0.5)',
            border:'1px solid rgba(196,144,58,0.5)',
          }}>
            <div style={{color:'#6B4A10',fontSize:9,marginBottom:2}}>⚠ ARCGIS PAIN POINT</div>
            <div style={{marginBottom:4}}>{a.label}</div>
            <div style={{color:'#2E7D5E',fontSize:9,background:'rgba(0,0,0,0.12)',borderRadius:3,padding:'2px 5px'}}>✓ {a.fix}</div>
          </div>
        </div>
      ))}
    </div>
  );
};

/* ─── App ─────────────────────────────────── */
const App=()=>{
  const [query,setQuery]=useState('');
  const [loading,setLoading]=useState(false);
  const [layers,setLayers]=useState(LAYER_GROUPS);
  const [layerSearch,setLayerSearch]=useState('');
  const [leftPanel,setLeftPanel]=useState('layers'); // layers | query | null
  const [rightPanel,setRightPanel]=useState(null); // feature id | basemap | null
  const [selectedMarker,setSelectedMarker]=useState(null);
  const [activeQuery,setActiveQuery]=useState(1);
  const [basemap,setBasemap]=useState('dark');
  const [showAnnotations,setShowAnnotations]=useState(false);

  const handleMarkerClick=(m)=>{
    if(selectedMarker?.id===m.id){setSelectedMarker(null);setRightPanel(null);}
    else{
      setSelectedMarker(m);
      const f=FEATURES[m.id];
      setRightPanel(f?`feature:${m.id}`:'feature:reg');
    }
  };
  const handleSubmit=()=>{
    if(!query.trim())return;
    setLoading(true);
    setTimeout(()=>{setLoading(false);setActiveQuery(1);setLeftPanel('query');},1100);
  };

  const rightPanelContent=()=>{
    if(!rightPanel)return null;
    if(rightPanel==='basemap')return(
      <BasemapPanel active={basemap} onSelect={b=>{setBasemap(b);}} onClose={()=>setRightPanel(null)}/>
    );
    if(rightPanel.startsWith('feature:')){
      const fid=rightPanel.split(':')[1];
      const f=FEATURES[fid]||FEATURES.reg;
      return<FeaturePanel feature={f} onClose={()=>{setRightPanel(null);setSelectedMarker(null);}}/>;
    }
    return null;
  };

  const leftIcon=(panel,icon,label,badge)=>{
    const active=leftPanel===panel;
    return(
      <button onClick={()=>setLeftPanel(leftPanel===panel?null:panel)} title={label} style={{
        display:'flex',flexDirection:'column',alignItems:'center',gap:3,
        padding:'8px 10px',background:active?C.maroonDim:'none',border:'none',
        borderRight:active?`2px solid ${C.maroon}`:'2px solid transparent',
        color:active?C.fg1:C.fg3,cursor:'pointer',position:'relative',
        transition:'background 0.15s',
      }}>
        <Ic name={icon} size={18} color={active?C.maroon:C.fg3}/>
        <span style={{fontSize:9,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase'}}>{label}</span>
        {badge&&<span style={{position:'absolute',top:6,right:6,width:6,height:6,borderRadius:'50%',background:C.maroon}}/>}
      </button>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

      {/* ── Top bar ── */}
      <div style={{background:C.maroon,height:52,display:'flex',alignItems:'center',padding:'0 14px',gap:12,flexShrink:0,zIndex:20,boxShadow:'0 2px 16px rgba(0,0,0,0.45)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <Phoenix size={22} color="white"/>
          <div>
            <div style={{fontFamily:'EB Garamond,Georgia,serif',fontSize:17,color:'white',lineHeight:1.1,letterSpacing:'0.01em'}}>CampusGeo</div>
            <div style={{fontSize:8,color:'rgba(255,255,255,0.55)',letterSpacing:'0.12em',textTransform:'uppercase'}}>University of Chicago</div>
          </div>
        </div>

        <div style={{width:1,height:24,background:'rgba(255,255,255,0.2)',flexShrink:0}}/>

        <AISearchBar value={query} onChange={setQuery} onSubmit={handleSubmit} loading={loading} onHistoryClick={()=>setLeftPanel(p=>p==='query'?null:'query')}/>

        <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto',flexShrink:0}}>
          {/* Annotation toggle */}
          <button onClick={()=>setShowAnnotations(a=>!a)} title="Show UX improvements vs ArcGIS" style={{
            background:showAnnotations?'rgba(196,144,58,0.25)':'rgba(255,255,255,0.1)',
            border:`1px solid ${showAnnotations?C.amber:'rgba(255,255,255,0.15)'}`,
            borderRadius:6,padding:'5px 10px',color:showAnnotations?C.amberLight:'rgba(255,255,255,0.7)',
            fontSize:11,fontWeight:500,display:'flex',alignItems:'center',gap:5,
          }}>
            <Ic name="info" size={13} color={showAnnotations?C.amberLight:'rgba(255,255,255,0.7)'}/>
            UX Notes
          </button>
          <button onClick={()=>setRightPanel(rp=>rp==='basemap'?null:'basemap')} title="Switch basemap" style={{
            background:rightPanel==='basemap'?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.1)',
            border:'none',borderRadius:6,padding:'7px 8px',color:'white',display:'flex',
          }}>
            <Ic name="map" size={16} color="white"/>
          </button>
          <button style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:6,padding:'7px 8px',color:'white',display:'flex'}}>
            <Ic name="share" size={16} color="white"/>
          </button>
          <button style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:6,padding:'7px 8px',color:'white',display:'flex'}}>
            <Ic name="printer" size={16} color="white"/>
          </button>
          <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,0.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'white',letterSpacing:'0.02em'}}>JS</div>
        </div>
      </div>

      {/* ── Main layout ── */}
      <div style={{display:'flex',flex:1,overflow:'hidden',position:'relative'}}>

        {/* Left icon rail */}
        <div style={{width:58,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:6,flexShrink:0,zIndex:10}}>
          {leftIcon('layers','layers','Layers')}
          {leftIcon('query','zap','AI',true)}
          {leftIcon('bookmarks','bookmark','Saved')}
          <div style={{flex:1}}/>
          <button title="Filter" style={{padding:'8px 10px',background:'none',border:'none',color:C.fg4,display:'flex',flexDirection:'column',alignItems:'center',gap:3,marginBottom:8,cursor:'pointer'}}>
            <Ic name="filter" size={18} color={C.fg4}/>
            <span style={{fontSize:9,color:C.fg4,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase'}}>Filter</span>
          </button>
        </div>

        {/* Left expandable panel */}
        {leftPanel&&leftPanel!=='bookmarks'&&(
          <div style={{width:280,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0,
            animation:'slideIn 0.2s ease-out both',
          }}>
            {leftPanel==='layers'&&<LayerPanel groups={layers} setGroups={setLayers} layerSearch={layerSearch} setLayerSearch={setLayerSearch}/>}
            {leftPanel==='query'&&<QueryPanel queries={QUERY_HISTORY} activeId={activeQuery} onSelect={id=>{setActiveQuery(id);}} onClose={()=>setLeftPanel(null)}/>}
          </div>
        )}

        {/* Map */}
        <div style={{position:'relative',flex:1,overflow:'hidden'}}>
          <CampusMap markers={MAP_MARKERS} selectedId={selectedMarker?.id} onMarkerClick={handleMarkerClick} activeBasemap={basemap}/>
          <AnnotationsOverlay visible={showAnnotations}/>
        </div>

        {/* Right panel */}
        {rightPanel&&(
          <div style={{width:320,background:C.surface,borderLeft:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
            {rightPanelContent()}
          </div>
        )}
      </div>

      {/* ── Status bar ── */}
      <div style={{height:24,background:C.surface,borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 14px',gap:16,flexShrink:0}}>
        <span style={{fontSize:10,color:C.fg4,fontFamily:'JetBrains Mono,monospace'}}>41.7886° N, 87.5987° W</span>
        <div style={{width:1,height:12,background:C.border}}/>
        <span style={{fontSize:10,color:C.fg4}}>Zoom 16 · Scale 1:2,000</span>
        <div style={{width:1,height:12,background:C.border}}/>
        <span style={{fontSize:10,color:C.fg4}}>WGS 84</span>
        <div style={{flex:1}}/>
        {layers.reduce((a,g)=>a+g.layers.filter(l=>l.on).length,0)>0&&(
          <span style={{fontSize:10,color:C.fg3}}>
            {layers.reduce((a,g)=>a+g.layers.filter(l=>l.on).length,0)} layer{layers.reduce((a,g)=>a+g.layers.filter(l=>l.on).length,0)!==1?'s':''} visible
          </span>
        )}
        <div style={{width:1,height:12,background:C.border}}/>
        <span style={{fontSize:10,color:C.fg4}}>© UChicago Campus Operations</span>
      </div>

      <style>{`
        @keyframes slideIn { from { transform: translateX(-8px); } to { transform: translateX(0); } }
      `}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
